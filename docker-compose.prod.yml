services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  grobid:
    image: lfoppiano/grobid:0.8.0
    ports:
      - "8070:8070"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://research:research@postgres:5432/research
      GROBID_URL: http://grobid:8070
    ports:
      - "34322:8000"
    restart: unless-stopped
    volumes:
      - backend-storage:/app/storage
    depends_on:
      - postgres
      - grobid
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "34321:4173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
  backend-storage:
